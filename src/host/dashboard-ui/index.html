<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>minibot supervisor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: 30% 70%;
    height: 100vh;
  }

  /* --- Left: Command Panel --- */
  #command-panel {
    display: flex;
    flex-direction: column;
    border-right: 1px solid #333;
    height: 100vh;
  }

  #command-header {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    font-size: 14px;
    color: #888;
  }

  #command-header span { color: #4ade80; }

  #command-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  #command-input-wrap {
    border-top: 1px solid #333;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #command-input-wrap span { color: #4ade80; }

  #command-input {
    flex: 1;
    background: transparent;
    border: none;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 15px;
    outline: none;
  }

  /* --- Right: VM Panels --- */
  #vm-panels {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow-y: auto;
  }

  .vm-panel {
    border-bottom: 1px solid #333;
    padding: 12px 16px;
    min-height: 120px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .vm-panel.focused {
    flex: 1;
    min-height: unset;
  }

  .vm-panel:not(.focused) .vm-detail { display: none; }

  .vm-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .vm-status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
  }

  .vm-status.stopped { background: #666; }
  .vm-status.error { background: #ef4444; }

  .vm-id {
    font-size: 15px;
    font-weight: bold;
    color: #c4b5fd;
  }

  .vm-runtime {
    font-size: 13px;
    color: #666;
  }

  .vm-close {
    margin-left: auto;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    display: none;
  }

  .vm-panel.focused .vm-close { display: block; }

  /* Channel sections */
  .vm-channels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 6px;
  }

  .channel {
  }

  .channel-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .channel-label.ops { color: #fbbf24; }
  .channel-label.work { color: #60a5fa; }

  .channel-messages {
    font-size: 13px;
    line-height: 1.5;
    max-height: 80px;
    overflow-y: hidden;
  }

  .vm-panel.focused .channel-messages {
    max-height: none;
    overflow-y: auto;
  }

  .vm-detail {
    margin-top: 8px;
  }

  .vm-detail .channel-messages {
    max-height: 300px;
    overflow-y: auto;
  }

  /* Messages */
  .msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .msg .ts { color: #555; }
  .msg .dir-in { color: #4ade80; }
  .msg .dir-out { color: #60a5fa; }
  .msg .type { color: #c4b5fd; }
  .msg .payload { color: #888; }
  .msg.error { color: #ef4444; }
  .msg.alert { color: #f97316; font-weight: bold; }

  /* Command log entries */
  .log-entry { margin-bottom: 2px; }
  .log-entry .ts { color: #555; }
  .log-entry.system { color: #888; }
  .log-entry.error { color: #ef4444; }
  .log-entry.success { color: #4ade80; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  /* No VMs placeholder */
  #no-vms {
    padding: 40px;
    text-align: center;
    color: #555;
    font-size: 14px;
  }

  #connection-status {
    font-size: 10px;
    padding: 4px 16px;
    border-top: 1px solid #333;
  }
  #connection-status.connected { color: #4ade80; }
  #connection-status.disconnected { color: #ef4444; }
</style>
</head>
<body>
<div id="app">
  <div id="command-panel">
    <div id="command-header"><span>minibot</span> supervisor</div>
    <div id="command-log"></div>
    <div id="command-input-wrap">
      <span>&gt;</span>
      <input id="command-input" type="text" placeholder="nudge, filter, status, clear" autofocus>
    </div>
    <div id="connection-status" class="disconnected">disconnected</div>
  </div>
  <div id="vm-panels">
    <div id="no-vms">waiting for containers...</div>
  </div>
</div>

<script>
const vms = new Map(); // containerId -> { el, ops: [], work: [], status, focused }
let ws;
let filter = null;

function time(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
}

function logCommand(text, cls = '') {
  const el = document.getElementById('command-log');
  const div = document.createElement('div');
  div.className = 'log-entry ' + cls;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function ensureVM(id) {
  if (vms.has(id)) return vms.get(id);

  document.getElementById('no-vms')?.remove();

  const vm = { ops: [], work: [], status: 'running', focused: false };

  const panel = document.createElement('div');
  panel.className = 'vm-panel';
  panel.id = 'vm-' + id;

  panel.innerHTML = `
    <div class="vm-header">
      <div class="vm-status"></div>
      <span class="vm-id">${id}</span>
      <span class="vm-runtime"></span>
      <span class="vm-close">[x]</span>
    </div>
    <div class="vm-channels">
      <div class="channel">
        <div class="channel-label ops">ops</div>
        <div class="channel-messages" data-channel="ops"></div>
      </div>
      <div class="channel">
        <div class="channel-label work">work</div>
        <div class="channel-messages" data-channel="work"></div>
      </div>
    </div>
    <div class="vm-detail">
      <div class="vm-channels">
        <div class="channel">
          <div class="channel-label ops">ops (full)</div>
          <div class="channel-messages" data-channel="ops-detail"></div>
        </div>
        <div class="channel">
          <div class="channel-label work">work (full)</div>
          <div class="channel-messages" data-channel="work-detail"></div>
        </div>
      </div>
    </div>
  `;

  panel.querySelector('.vm-header').addEventListener('click', (e) => {
    if (e.target.classList.contains('vm-close')) {
      vm.focused = false;
      panel.classList.remove('focused');
      return;
    }
    vm.focused = !vm.focused;
    // Unfocus all others
    for (const [, v] of vms) {
      if (v !== vm) {
        v.focused = false;
        v.el.classList.remove('focused');
      }
    }
    panel.classList.toggle('focused', vm.focused);
  });

  document.getElementById('vm-panels').appendChild(panel);
  vm.el = panel;
  vms.set(id, vm);
  return vm;
}

function addMessage(containerId, channel, direction, type, payload, ts) {
  const vm = ensureVM(containerId);
  const arr = channel === 'ops' ? vm.ops : vm.work;

  const entry = { direction, type, payload, ts };
  arr.push(entry);
  if (arr.length > 500) arr.shift();

  // Apply filter
  if (filter && !matchesFilter(containerId, channel, type, payload)) return;

  const msgHtml = formatMessage(entry);

  // Update compact view
  const compact = vm.el.querySelector(`[data-channel="${channel}"]`);
  compact.innerHTML += msgHtml;
  compact.scrollTop = compact.scrollHeight;

  // Update detail view
  const detail = vm.el.querySelector(`[data-channel="${channel}-detail"]`);
  const detailHtml = formatMessageDetail(entry);
  detail.innerHTML += detailHtml;
  detail.scrollTop = detail.scrollHeight;
}

function formatMessage(entry) {
  const dir = entry.direction === 'in'
    ? '<span class="dir-in">&gt;</span>'
    : '<span class="dir-out">&lt;</span>';
  const payloadStr = typeof entry.payload === 'object' ? JSON.stringify(entry.payload) : '';
  return `<div class="msg">${dir} <span class="type">${entry.type}</span> <span class="payload">${escHtml(payloadStr)}</span></div>`;
}

function formatMessageDetail(entry) {
  const dir = entry.direction === 'in'
    ? '<span class="dir-in">&gt;</span>'
    : '<span class="dir-out">&lt;</span>';
  const payloadStr = typeof entry.payload === 'object' ? JSON.stringify(entry.payload, null, 2) : '';
  return `<div class="msg"><span class="ts">${time(entry.ts)}</span> ${dir} <span class="type">${entry.type}</span><br><span class="payload">${escHtml(payloadStr)}</span></div>`;
}

function matchesFilter(containerId, channel, type, payload) {
  if (!filter) return true;
  const text = `${containerId} ${channel} ${type} ${JSON.stringify(payload)}`.toLowerCase();
  return text.includes(filter.toLowerCase());
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// --- WebSocket ---

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    document.getElementById('connection-status').textContent = 'connected';
    document.getElementById('connection-status').className = 'connected';
    logCommand('connected to supervisor', 'success');
  };

  ws.onclose = () => {
    document.getElementById('connection-status').textContent = 'disconnected';
    document.getElementById('connection-status').className = 'disconnected';
    logCommand('disconnected — reconnecting...', 'error');
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  };
}

function handleEvent(event) {
  const { kind, containerId, timestamp, data } = event;

  switch (kind) {
    case 'container_start': {
      const vm = ensureVM(containerId);
      vm.el.querySelector('.vm-runtime').textContent = data.runtime || '';
      logCommand(`container started: ${containerId} (${data.runtime})`, 'success');
      break;
    }

    case 'container_stop': {
      const vm = vms.get(containerId);
      if (vm) {
        vm.status = 'stopped';
        vm.el.querySelector('.vm-status').classList.add('stopped');
      }
      logCommand(`container stopped: ${containerId}`, 'system');
      break;
    }

    case 'ops':
      addMessage(containerId, 'ops', 'in', data.type, data.payload, timestamp);
      break;

    case 'work_in':
      addMessage(containerId, 'work', 'in', data.type, data.payload, timestamp);
      break;

    case 'work_out':
      addMessage(containerId, 'work', 'out', data.type, data.payload, timestamp);
      break;

    case 'error':
      logCommand(`error [${containerId}]: ${data.message}`, 'error');
      break;
  }
}

// --- Commands ---

document.getElementById('command-input').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const input = e.target;
  const cmd = input.value.trim();
  input.value = '';
  if (!cmd) return;

  logCommand('> ' + cmd);

  const parts = cmd.split(/\s+/);
  switch (parts[0]) {
    case 'nudge': {
      const target = parts[1] || '*';
      ws.send(JSON.stringify({ action: 'nudge', containerId: target }));
      logCommand(`nudge sent to ${target}`, 'success');
      break;
    }

    case 'filter': {
      if (parts.length < 2) {
        filter = null;
        logCommand('filter cleared', 'system');
      } else {
        filter = parts.slice(1).join(' ');
        logCommand(`filter: ${filter}`, 'system');
      }
      break;
    }

    case 'status': {
      if (vms.size === 0) {
        logCommand('no containers', 'system');
      } else {
        for (const [id, vm] of vms) {
          logCommand(`  ${id}: ${vm.status} (ops: ${vm.ops.length} msgs, work: ${vm.work.length} msgs)`, 'system');
        }
      }
      break;
    }

    case 'clear':
      document.getElementById('command-log').innerHTML = '';
      break;

    default:
      logCommand('unknown command: ' + parts[0], 'error');
      logCommand('commands: nudge [id|*], filter [text], status, clear', 'system');
  }
});

connect();
</script>
</body>
</html>
