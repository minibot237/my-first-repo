<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>minibot supervisor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  #app {
    display: flex;
    height: 100vh;
  }

  /* --- Left: Command Panel --- */
  #command-panel {
    display: flex;
    flex-direction: column;
    width: 30%;
    min-width: 120px;
    height: 100vh;
  }

  #command-header {
    padding: 12px 16px;
    border-bottom: 1px solid #333;
    font-size: 14px;
    color: #888;
  }

  #command-header span { color: #4ade80; }

  #command-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
    font-size: 14px;
    line-height: 1.6;
  }

  #command-input-wrap {
    border-top: 1px solid #333;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #command-input-wrap span { color: #4ade80; }

  #command-input {
    flex: 1;
    background: transparent;
    border: none;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 15px;
    outline: none;
  }

  /* --- Resize handles --- */
  .resize-h {
    width: 5px;
    min-width: 5px;
    cursor: col-resize;
    background: #333;
    flex-shrink: 0;
  }

  .resize-h:hover, .resize-h.active { background: #555; }

  .resize-v {
    height: 5px;
    min-height: 5px;
    cursor: row-resize;
    background: #333;
    flex-shrink: 0;
  }

  .resize-v:hover, .resize-v.active { background: #555; }

  /* --- Right: VM Panels --- */
  #vm-panels {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 200px;
    height: 100vh;
    overflow-y: auto;
  }

  .vm-panel {
    display: flex;
    flex-direction: column;
    padding: 12px 16px;
    min-height: 80px;
    height: 360px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .vm-panel.focused {
    flex: 1;
    height: auto;
    min-height: unset;
  }

  .vm-panel:not(.focused) .vm-detail { display: none; }

  .vm-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .vm-status {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4ade80;
  }

  .vm-status.stopped { background: #666; }
  .vm-status.error { background: #ef4444; }

  .vm-id {
    font-size: 15px;
    font-weight: bold;
    color: #c4b5fd;
  }

  .vm-runtime {
    font-size: 13px;
    color: #666;
  }

  .vm-close {
    margin-left: auto;
    color: #666;
    cursor: pointer;
    font-size: 14px;
    display: none;
  }

  .vm-panel.focused .vm-close { display: block; }

  /* Channel sections */
  .vm-channels {
    display: flex;
    flex: 1;
    min-height: 0;
    margin-top: 6px;
    overflow: hidden;
  }

  .channel {
    display: flex;
    flex-direction: column;
    min-width: 80px;
    overflow: hidden;
  }

  .channel:first-child { width: 50%; }
  .channel:last-child { flex: 1; }

  .channel-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 2px;
    padding-bottom: 4px;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }

  .channel-label.ops { color: #fbbf24; }
  .channel-label.work { color: #60a5fa; }

  .hb-toggle {
    font-size: 11px;
    text-transform: none;
    letter-spacing: 0;
    color: #666;
    cursor: pointer;
    margin-left: 6px;
    user-select: none;
  }

  .hb-toggle input { vertical-align: middle; cursor: pointer; }

  .channel.hide-heartbeats .msg-heartbeat { display: none; }

  .channel-messages {
    font-size: 13px;
    line-height: 1.5;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  .vm-detail {
    margin-top: 8px;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .vm-detail .channel-messages {
    overflow-y: auto;
  }

  /* Messages */
  .msg { white-space: pre-wrap; word-break: break-all; }
  .msg .ts { color: #555; }
  .msg .dir-in { color: #4ade80; }
  .msg .dir-out { color: #60a5fa; }
  .msg .type { color: #c4b5fd; }
  .msg .payload { color: #888; }
  .msg.error { color: #ef4444; }
  .msg.alert { color: #f97316; font-weight: bold; }

  /* Command log entries */
  .log-entry { margin-bottom: 2px; }
  .log-entry .ts { color: #555; }
  .log-entry.system { color: #888; }
  .log-entry.error { color: #ef4444; }
  .log-entry.success { color: #4ade80; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  /* No VMs placeholder */
  #no-vms {
    padding: 40px;
    text-align: center;
    color: #555;
    font-size: 14px;
  }

  #connection-status {
    font-size: 10px;
    padding: 4px 16px;
    border-top: 1px solid #333;
  }
  #connection-status.connected { color: #4ade80; }
  #connection-status.disconnected { color: #ef4444; }

  /* Disable text selection while dragging */
  body.resizing { cursor: col-resize; }
  body.resizing-v { cursor: row-resize; }
  body.resizing *, body.resizing-v * { user-select: none !important; pointer-events: none !important; }
  body.resizing .resize-h, body.resizing-v .resize-v { pointer-events: auto !important; }
</style>
</head>
<body>
<div id="app">
  <div id="command-panel">
    <div id="command-header"><span>minibot</span> supervisor</div>
    <div id="command-log"></div>
    <div id="command-input-wrap">
      <span>&gt;</span>
      <input id="command-input" type="text" placeholder="nudge, filter, status, clear" autofocus>
    </div>
    <div id="connection-status" class="disconnected">disconnected</div>
  </div>
  <div class="resize-h" id="main-resize"></div>
  <div id="vm-panels">
    <div id="no-vms">waiting for containers...</div>
  </div>
</div>

<script>
const vms = new Map();
let ws;
let filter = null;

function time(ts) {
  return new Date(ts).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit', fractionalSecondDigits: 3 });
}

function logCommand(text, cls = '') {
  const el = document.getElementById('command-log');
  const div = document.createElement('div');
  div.className = 'log-entry ' + cls;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// --- Drag resize helper ---

function makeDragH(handle, getLeft, getRight) {
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const left = getLeft();
    const right = getRight();
    if (!left || !right) return;
    const startX = e.clientX;
    const startLeftW = left.getBoundingClientRect().width;
    const startRightW = right.getBoundingClientRect().width;
    handle.classList.add('active');
    document.body.classList.add('resizing');

    function onMove(e) {
      const dx = e.clientX - startX;
      const newLeft = Math.max(120, startLeftW + dx);
      const newRight = Math.max(80, startRightW - dx);
      left.style.width = newLeft + 'px';
      left.style.flex = 'none';
      right.style.width = newRight + 'px';
      right.style.flex = 'none';
    }

    function onUp() {
      handle.classList.remove('active');
      document.body.classList.remove('resizing');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function makeDragV(handle, getPanel) {
  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const panel = getPanel();
    if (!panel) return;
    const startY = e.clientY;
    const startH = panel.getBoundingClientRect().height;
    handle.classList.add('active');
    document.body.classList.add('resizing-v');

    function onMove(e) {
      const dy = e.clientY - startY;
      const newH = Math.max(80, startH + dy);
      panel.style.height = newH + 'px';
      panel.style.flex = 'none';
    }

    function onUp() {
      handle.classList.remove('active');
      document.body.classList.remove('resizing-v');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// --- Main horizontal resize: command panel <-> vm panels ---
makeDragH(
  document.getElementById('main-resize'),
  () => document.getElementById('command-panel'),
  () => document.getElementById('vm-panels')
);

// --- VM creation ---

function ensureVM(id) {
  if (vms.has(id)) return vms.get(id);

  document.getElementById('no-vms')?.remove();

  const vm = { ops: [], work: [], status: 'running', focused: false };

  const panel = document.createElement('div');
  panel.className = 'vm-panel';
  panel.id = 'vm-' + id;

  const opsChannel = document.createElement('div');
  opsChannel.className = 'channel';
  opsChannel.innerHTML = `<div class="channel-label ops">ops <label class="hb-toggle"><input type="checkbox" data-hb-filter checked> hb</label></div><div class="channel-messages" data-channel="ops"></div>`;

  const workChannel = document.createElement('div');
  workChannel.className = 'channel';
  workChannel.innerHTML = `<div class="channel-label work">work</div><div class="channel-messages" data-channel="work"></div>`;

  const channelResize = document.createElement('div');
  channelResize.className = 'resize-h';

  const channels = document.createElement('div');
  channels.className = 'vm-channels';
  channels.appendChild(opsChannel);
  channels.appendChild(channelResize);
  channels.appendChild(workChannel);

  // Wire up ops<->work horizontal resize
  makeDragH(channelResize, () => opsChannel, () => workChannel);

  const header = document.createElement('div');
  header.className = 'vm-header';
  header.innerHTML = `
    <div class="vm-status"></div>
    <span class="vm-id">${id.toUpperCase()}</span>
    <span class="vm-runtime"></span>
    <span class="vm-close">[x]</span>
  `;

  // Detail section for focus mode
  const detailOps = document.createElement('div');
  detailOps.className = 'channel';
  detailOps.innerHTML = `<div class="channel-label ops">ops (full) <label class="hb-toggle"><input type="checkbox" data-hb-filter checked> hb</label></div><div class="channel-messages" data-channel="ops-detail"></div>`;

  const detailWork = document.createElement('div');
  detailWork.className = 'channel';
  detailWork.innerHTML = `<div class="channel-label work">work (full)</div><div class="channel-messages" data-channel="work-detail"></div>`;

  const detailResize = document.createElement('div');
  detailResize.className = 'resize-h';

  const detailChannels = document.createElement('div');
  detailChannels.className = 'vm-channels';
  detailChannels.appendChild(detailOps);
  detailChannels.appendChild(detailResize);
  detailChannels.appendChild(detailWork);

  makeDragH(detailResize, () => detailOps, () => detailWork);

  const detail = document.createElement('div');
  detail.className = 'vm-detail';
  detail.appendChild(detailChannels);

  panel.appendChild(header);
  panel.appendChild(channels);
  panel.appendChild(detail);

  // Wire up heartbeat filter checkboxes
  panel.querySelectorAll('[data-hb-filter]').forEach((cb) => {
    cb.addEventListener('click', (e) => e.stopPropagation());
    cb.addEventListener('change', () => {
      const container = cb.closest('.channel');
      container.classList.toggle('hide-heartbeats', !cb.checked);
    });
  });

  header.addEventListener('click', (e) => {
    if (e.target.classList.contains('vm-close')) {
      vm.focused = false;
      panel.classList.remove('focused');
      return;
    }
    vm.focused = !vm.focused;
    for (const [, v] of vms) {
      if (v !== vm) {
        v.focused = false;
        v.el.classList.remove('focused');
      }
    }
    panel.classList.toggle('focused', vm.focused);
  });

  const vmPanels = document.getElementById('vm-panels');
  vmPanels.appendChild(panel);

  // Add bottom resize handle for this panel
  const vResize = document.createElement('div');
  vResize.className = 'resize-v';
  makeDragV(vResize, () => panel);
  vmPanels.appendChild(vResize);
  vm.el = panel;
  vms.set(id, vm);
  return vm;
}

function addMessage(containerId, channel, direction, type, payload, ts) {
  const vm = ensureVM(containerId);
  const arr = channel === 'ops' ? vm.ops : vm.work;

  const entry = { direction, type, payload, ts };
  arr.push(entry);
  if (arr.length > 500) arr.shift();

  if (filter && !matchesFilter(containerId, channel, type, payload)) return;

  const msgHtml = formatMessage(entry);

  const compact = vm.el.querySelector(`[data-channel="${channel}"]`);
  compact.innerHTML += msgHtml;
  compact.scrollTop = compact.scrollHeight;

  const detail = vm.el.querySelector(`[data-channel="${channel}-detail"]`);
  const detailHtml = formatMessageDetail(entry);
  detail.innerHTML += detailHtml;
  detail.scrollTop = detail.scrollHeight;
}

function formatMessage(entry) {
  const dir = entry.direction === 'in'
    ? '<span class="dir-in">&gt;</span>'
    : '<span class="dir-out">&lt;</span>';
  const payloadStr = typeof entry.payload === 'object' ? JSON.stringify(entry.payload) : '';
  const cls = entry.type === 'heartbeat' ? 'msg msg-heartbeat' : 'msg';
  return `<div class="${cls}">${dir} <span class="type">${entry.type}</span> <span class="payload">${escHtml(payloadStr)}</span></div>`;
}

function formatMessageDetail(entry) {
  const dir = entry.direction === 'in'
    ? '<span class="dir-in">&gt;</span>'
    : '<span class="dir-out">&lt;</span>';
  const payloadStr = typeof entry.payload === 'object' ? JSON.stringify(entry.payload, null, 2) : '';
  const cls = entry.type === 'heartbeat' ? 'msg msg-heartbeat' : 'msg';
  return `<div class="${cls}"><span class="ts">${time(entry.ts)}</span> ${dir} <span class="type">${entry.type}</span><br><span class="payload">${escHtml(payloadStr)}</span></div>`;
}

function matchesFilter(containerId, channel, type, payload) {
  if (!filter) return true;
  const text = `${containerId} ${channel} ${type} ${JSON.stringify(payload)}`.toLowerCase();
  return text.includes(filter.toLowerCase());
}

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// --- WebSocket ---

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    document.getElementById('connection-status').textContent = 'connected';
    document.getElementById('connection-status').className = 'connected';
    logCommand('connected to supervisor', 'success');
  };

  ws.onclose = () => {
    document.getElementById('connection-status').textContent = 'disconnected';
    document.getElementById('connection-status').className = 'disconnected';
    logCommand('disconnected — reconnecting...', 'error');
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const event = JSON.parse(e.data);
    handleEvent(event);
  };
}

function handleEvent(event) {
  const { kind, containerId, timestamp, data } = event;

  switch (kind) {
    case 'container_start': {
      const vm = ensureVM(containerId);
      vm.el.querySelector('.vm-runtime').textContent = data.runtime || '';
      logCommand(`container started: ${containerId} (${data.runtime})`, 'success');
      break;
    }

    case 'container_stop': {
      const vm = vms.get(containerId);
      if (vm) {
        vm.status = 'stopped';
        vm.el.querySelector('.vm-status').classList.add('stopped');
      }
      logCommand(`container stopped: ${containerId}`, 'system');
      break;
    }

    case 'ops':
      addMessage(containerId, 'ops', 'in', data.type, data.payload, timestamp);
      break;

    case 'work_in':
      addMessage(containerId, 'work', 'in', data.type, data.payload, timestamp);
      break;

    case 'work_out':
      addMessage(containerId, 'work', 'out', data.type, data.payload, timestamp);
      break;

    case 'error':
      logCommand(`error [${containerId}]: ${data.message}`, 'error');
      break;
  }
}

// --- Commands ---

document.getElementById('command-input').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const input = e.target;
  const cmd = input.value.trim();
  input.value = '';
  if (!cmd) return;

  logCommand('> ' + cmd);

  const parts = cmd.split(/\s+/);
  switch (parts[0]) {
    case 'nudge': {
      const target = parts[1] || '*';
      ws.send(JSON.stringify({ action: 'nudge', containerId: target }));
      logCommand(`nudge sent to ${target}`, 'success');
      break;
    }

    case 'filter': {
      if (parts.length < 2) {
        filter = null;
        logCommand('filter cleared', 'system');
      } else {
        filter = parts.slice(1).join(' ');
        logCommand(`filter: ${filter}`, 'system');
      }
      break;
    }

    case 'status': {
      if (vms.size === 0) {
        logCommand('no containers', 'system');
      } else {
        for (const [id, vm] of vms) {
          logCommand(`  ${id}: ${vm.status} (ops: ${vm.ops.length} msgs, work: ${vm.work.length} msgs)`, 'system');
        }
      }
      break;
    }

    case 'clear':
      document.getElementById('command-log').innerHTML = '';
      break;

    default:
      logCommand('unknown command: ' + parts[0], 'error');
      logCommand('commands: nudge [id|*], filter [text], status, clear', 'system');
  }
});

connect();
</script>
</body>
</html>
